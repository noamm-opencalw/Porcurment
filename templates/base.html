<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Porcurment{% endblock %} — AI Deal Finder</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Text:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Material Symbols -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />

    <!-- App CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <!-- Navigation -->
    <nav class="nav-bar">
        <div class="nav-inner">
            <a href="{{ url_for('home') }}" class="nav-brand">
                <span class="material-symbols-rounded brand-icon">shopping_cart</span>
                <span class="brand-text">Porcurment</span>
            </a>
            <div class="nav-links">
                <a href="{{ url_for('home') }}" class="nav-link {% if active_page == 'home' %}active{% endif %}">
                    <span class="material-symbols-rounded">search</span>
                    <span>Search</span>
                </a>
                <a href="{{ url_for('history') }}" class="nav-link {% if active_page == 'history' %}active{% endif %}">
                    <span class="material-symbols-rounded">history</span>
                    <span>History</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Toast container -->
    <div id="toast-container"></div>

    <!-- App JS -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
